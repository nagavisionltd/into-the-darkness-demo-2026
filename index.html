<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline';">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Veil of Night - Level 1 Prototype</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 4px solid #444;
            background-color: #050510; /* Dark City Night */
            box-shadow: 0 0 20px #000;
            image-rendering: pixelated; /* Crucial for pixel art later */
        }
        #ui {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="ui">
        <h2>THE VEIL OF NIGHT</h2>
        <p>WASD/Arrows: Move | SHIFT: Run | SPACE: Jump | X: Punch | C: Kick | E: Energy Blast</p>
    </div>

<script>
/**
 * INTO THE DARKNESS - PROTOTYPE ENGINE V4
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- ASSET LOADER ---
const assets = {
    backgrounds: {
        city: new Image(), // Original background, now named 'city'
        jungle: new Image(), // New background
        sunset: new Image(), // New background
        level1: new Image() // New background for level 1
    },
    cover: new Image(),
    player: {
        idle: [], walk: [], run: [], jump: [], punch: [], uppercut: [], kick: [], crouch: [], energyBlast: [],
        dash: [], wallSlide: [], shadowStep: [], ledgeGrab: [], powerUp: []
    }
};

let assetsLoaded = 0;
const totalAssets = 48; // Updated count: Original (36) + Dash (2) + Wall (2) + Shadow (1) + Ledge (1) + Power (6)
function assetLoaded() {
    assetsLoaded++;
    console.log(`Assets loaded: ${assetsLoaded}/${totalAssets}`); // Debug log
    if (assetsLoaded === totalAssets) {
        console.log("All assets loaded. Starting game loop."); // Debug log
        loop();
    }
}

function loadImages(path, filenames, targetArray) {
    filenames.forEach(filename => {
        const img = new Image();
        img.src = `jax/${filename}.png`;
        img.onload = assetLoaded;
        img.onerror = () => { console.error(`Failed to load image: jax/${filename}.png`); assetLoaded(); }; // Handle errors
        targetArray.push(img);
    });
}

assets.backgrounds.city.src = 'background.png';
assets.backgrounds.city.onload = assetLoaded;
assets.backgrounds.city.onerror = () => { console.error(`Failed to load image: background.png`); assetLoaded(); };

assets.backgrounds.level1.src = 'level_1_background.gif';
assets.backgrounds.level1.onload = assetLoaded;
assets.backgrounds.level1.onerror = () => { console.error(`Failed to load image: level_1_background.gif`); assetLoaded(); };

assets.backgrounds.jungle.src = 'level_3_jungle.png';
assets.backgrounds.jungle.onload = assetLoaded;
assets.backgrounds.jungle.onerror = () => { console.error(`Failed to load image: level_3_jungle.png`); assetLoaded(); };

assets.backgrounds.sunset.src = 'level_4_sunset.png';
assets.backgrounds.sunset.onload = assetLoaded;
assets.backgrounds.sunset.onerror = () => { console.error(`Failed to load image: level_4_sunset.png`); assetLoaded(); };

assets.cover.src = 'into_darkness_cover.png';
assets.cover.onload = assetLoaded;
assets.cover.onerror = () => { console.error(`Failed to load image: into_darkness_cover.png`); assetLoaded(); };

assets.cover.onload = assetLoaded;

loadImages('jax', ['idle'], assets.player.idle);
console.log('Idle animation frames loaded:', assets.player.idle.length); 
loadImages('jax', ['walking_frame', 'walking_frame_2', 'walking_frame_3', 'walking_frame_4'], assets.player.walk);
loadImages('jax', ['running_frame', 'running_frame_2', 'running_frame_3', 'running_frame_4'], assets.player.run);
loadImages('jax', ['jump_1', 'jump', 'jump_2', 'jump_3', 'jump_4'], assets.player.jump);
loadImages('jax', ['punch_idle', 'punch_left', 'punch_right', 'punch_upper_cut', 'punch_finish'], assets.player.punch);
loadImages('jax', ['uppercut'], assets.player.uppercut);
loadImages('jax', ['kick', 'kick_2'], assets.player.kick);
loadImages('jax', ['crouch'], assets.player.crouch);
loadImages('jax', ['blast', 'blast_1', 'blast_2', 'blast_3', 'blast_4', 'blast_5'], assets.player.energyBlast);
loadImages('jax', ['dash_1', 'dash_2'], assets.player.dash);
loadImages('jax', ['wall_slide_1', 'wall_slide_2'], assets.player.wallSlide);
loadImages('jax', ['shadow_step'], assets.player.shadowStep);
loadImages('jax', ['ledge_grab'], assets.player.ledgeGrab);
loadImages('jax', ['power_up_1', 'power_up_2', 'power_up_3', 'power_up_4', 'power_up_5', 'power_up_6'], assets.player.powerUp);

// --- ANIMATION DATA ---
const animations = {
    idle: { frames: assets.player.idle, frameRate: 10, loop: true },
    walk: { frames: assets.player.walk, frameRate: 5, loop: true },
    run: { frames: assets.player.run, frameRate: 5, loop: true },
    jump: { frames: assets.player.jump, frameRate: 5, loop: false },
    punch: { frames: assets.player.punch, frameRate: 4, loop: false },
    kick: { frames: assets.player.kick, frameRate: 5, loop: false },
    crouch: { frames: assets.player.crouch, frameRate: 10, loop: false },
    energyBlast: { frames: assets.player.energyBlast, frameRate: 5, loop: true },
    dash: { frames: assets.player.dash, frameRate: 4, loop: true },
    wallSlide: { frames: assets.player.wallSlide, frameRate: 6, loop: true },
    shadowStep: { frames: assets.player.shadowStep, frameRate: 10, loop: false },
    ledgeGrab: { frames: assets.player.ledgeGrab, frameRate: 10, loop: true },
    powerUp: { frames: assets.player.powerUp, frameRate: 6, loop: true }
};

// --- LEVELS DATA ---
const levels = [
    { background: assets.backgrounds.city, width: 2000 }, // Example width
    { background: assets.backgrounds.level1, width: 2500 },
    { background: assets.backgrounds.jungle, width: 3000 },
    { background: assets.backgrounds.sunset, width: 2200 }
];

// --- GAME CONSTANTS ---
const GRAVITY = 0.8;
const FRICTION = 0.85;
const GROUND_Y = 380;
const LEVEL_END_THRESHOLD = 200; // Distance from the end of the level to trigger transition

// --- INPUT HANDLER ---
const keys = {
    right: false, left: false, jump: false, down: false,
    punch: false, kick: false, energyBlast: false, run: false
};

let lastPunchTime = 0;
const COMBO_WINDOW = 500; // Time in ms to continue a combo

document.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if (e.code === 'Space') keys.jump = true;
    if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
    if (e.code === 'KeyC') keys.kick = true;
    if (e.code === 'KeyE') keys.energyBlast = true;
    if (e.code === 'ShiftLeft') keys.run = true;

    if (e.code === 'KeyX') {
        if (!keys.punch) { // Process punch on key down edge
            keys.punch = true;
            player.handlePunch();
        }
    }
});

document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if (e.code === 'Space') keys.jump = false;
    if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
    if (e.code === 'KeyX') keys.punch = false;
    if (e.code === 'KeyC') keys.kick = false;
    if (e.code === 'KeyE') keys.energyBlast = false;
    if (e.code === 'ShiftLeft') keys.run = false;
});


// --- CAMERA ---
let camera = { x: 0, y: 0 };

// --- UTILS ---
function checkRectCollision(r1, r2) {
    return (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y);
}

// --- CLASSES ---
class Entity {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.vx = 0; this.vy = 0;
        this.isGrounded = false; this.facingRight = true;
        this.health = 100; this.maxHealth = 100;
        this.isDead = false; this.hitStun = 0;
    }

    applyPhysics() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += GRAVITY;
        this.vx *= FRICTION;
        if (this.y + this.h > GROUND_Y) {
            this.y = GROUND_Y - this.h;
            this.vy = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }
    }

    draw(ctx, camX) { // Base draw for health bar
        ctx.fillStyle = 'red';
        ctx.fillRect(this.x - camX, this.y - 15, this.w, 8);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(this.x - camX, this.y - 15, this.w * (this.health / this.maxHealth), 8);
    }
}

class Player extends Entity {
    constructor(x, y) {
        super(x, y, 140, 190);
        this.attackCooldown = 0;
        this.isAttacking = false;
        this.attackHitbox = null;
        this.state = 'idle';
        this.currentFrame = 0;
        this.frameTimer = 0;
        this.animation = animations.idle;
        this.comboStep = 0;
        
        // --- NEW MECHANICS STATE ---
        this.chargeTimer = 0;
        this.isCharging = false;
        this.isDashing = false;
        this.dashTimer = 0;
        this.onWall = false;
        this.isLedgeGrabbing = false;
        this.shadowStepActive = false;
    }

    setAnimation(animName) {
        if (this.state === animName) return;
        console.log(`Setting animation to: ${animName}`); // Debug log

        this.state = animName;
        this.animation = animations[animName];
        this.currentFrame = 0;
        this.frameTimer = 0;

        if (!this.animation || this.animation.frames.length === 0) {
            console.error(`Animation "${animName}" not found or has no frames. Reverting to idle.`);
            this.state = 'idle';
            this.animation = animations.idle;
        }
    }
    
    handlePunch() {
        if (this.isAttacking && this.state !== 'punch') return; // Can't punch if doing another attack
        if (this.attackCooldown > 0) return;

        const now = performance.now();
        if (now - lastPunchTime > COMBO_WINDOW) {
            this.comboStep = 0; // Reset combo if window expired
        }
        
        this.setAnimation('punch');
        this.isAttacking = true;
        this.currentFrame = this.comboStep;
        this.updateAttackHitbox();

        lastPunchTime = now;
        this.attackCooldown = this.animation.frameRate * 2; // Short cooldown between punches
    }


    update() {
        // State Machine
        if (!this.isAttacking) {
            if (!this.isGrounded) {
                this.setAnimation('jump');
            } else if (keys.down) {
                this.setAnimation('crouch');
            } else if ((keys.right || keys.left) && keys.run) {
                this.setAnimation('run');
            } else if (keys.right || keys.left) {
                this.setAnimation('walk');
            } else {
                this.setAnimation('idle');
            }
        }
        
        // Attacks
        if (this.attackCooldown > 0) this.attackCooldown--;

        // --- DASH LOGIC ---
        if (keys.run && !this.isDashing && this.isGrounded) {
            this.isDashing = true;
            this.dashTimer = 20;
            this.setAnimation('dash');
        }
        if (this.isDashing) {
            this.vx = this.facingRight ? 18 : -18;
            this.dashTimer--;
            if (this.dashTimer <= 0) this.isDashing = false;
        }

        // --- WALL SLIDE / LEDGE GRAB LOGIC ---
        // Simplified wall detection: check if at level bounds or pseudo-walls (implementation depends on map)
        // For now, let's trigger wall slide if at screen edge in air
        if (!this.isGrounded && (this.x <= camera.x || this.x >= camera.x + canvas.width - this.w)) {
            this.onWall = true;
            this.setAnimation('wallSlide');
            this.vy = 2; // Slow slide
        } else {
            this.onWall = false;
        }

        // --- CHARGE SHOT LOGIC ---
        if (keys.energyBlast) {
            this.isCharging = true;
            this.chargeTimer++;
            this.setAnimation('powerUp');
            // Visual feedback: charge scale or flicker (implemented in draw)
        } else {
            if (this.isCharging) {
                this.shoot(this.chargeTimer);
                this.isCharging = false;
                this.chargeTimer = 0;
                this.isAttacking = false;
            }
        }

        if (keys.kick && !this.isAttacking && !this.isCharging) {
             this.setAnimation('kick');
             this.isAttacking = true;
             this.attackCooldown = this.animation.frames.length * this.animation.frameRate;
        }
        
        // Movement
        if (this.hitStun <= 0 && (!this.isAttacking || this.state === 'run' || this.state === 'walk') && !this.isDashing && !this.isCharging) {
            if (keys.right) { this.vx = Math.min(this.vx + (keys.run ? 2.5 : 1.5), (keys.run ? 12 : 8)); this.facingRight = true; }
            if (keys.left) { this.vx = Math.max(this.vx - (keys.run ? 2.5 : 1.5), (keys.run ? -12 : -8)); this.facingRight = false; }
            if (keys.jump && (this.isGrounded || this.onWall)) { 
                this.vy = -22; 
                if (this.onWall) { // Wall Jump
                    this.vx = this.x <= camera.x ? 15 : -15;
                }
            }
        }

        this.applyPhysics();

        // Animation timing
        this.frameTimer++;
        if (this.frameTimer >= this.animation.frameRate) {
            this.frameTimer = 0;
            this.currentFrame++;

            if (this.currentFrame >= this.animation.frames.length) {
                if (this.animation.loop) {
                    this.currentFrame = 0;
                } else {
                     // Finished non-looping animation (like kick or a full combo)
                    if (this.state === 'punch') {
                        this.comboStep = 0; // Reset combo
                    }
                    this.isAttacking = false;
                    this.attackHitbox = null;
                    this.setAnimation('idle');
                }
            }
             // If it's a punch, advance the combo step if the next punch comes in time
             if (this.state === 'punch' && this.isAttacking) {
                 if (keys.punch && this.comboStep < this.animation.frames.length - 1) {
                     this.comboStep++;
                     this.currentFrame = this.comboStep;
                     this.frameTimer = 0; // Reset timer for the new frame
                     
                     this.updateAttackHitbox();
                 }
             }
        }
    }

    draw(ctx, camX) {
        if (this.isDead) return;
        if (this.hitStun > 0) this.hitStun--;

        const frame = this.animation.frames[this.currentFrame];
        if (!frame) {
            console.error(`Frame not found for animation: ${this.state}, frame: ${this.currentFrame}`);
            return;
        }

        ctx.save();
        if (!this.facingRight) {
            ctx.scale(-1, 1);
        }
        const drawX = this.facingRight ? this.x - camX : -(this.x - camX) - this.w;

        if (!(this.hitStun > 0 && this.hitStun % 4 < 2)) {
            // Charging visual feedback
            if (this.isCharging) {
                ctx.shadowBlur = Math.min(this.chargeTimer, 30);
                ctx.shadowColor = this.chargeTimer > 60 ? 'cyan' : 'blue';
                if (this.chargeTimer % 10 < 5) ctx.globalAlpha = 0.7; // Flicker
            }
            ctx.drawImage(frame, drawX, this.y, this.w, this.h);
            ctx.shadowBlur = 0; // Reset shadow
            ctx.globalAlpha = 1.0;
        }
        ctx.restore();

        // Draw hitbox for debugging
        if (this.attackHitbox) {
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.fillRect(this.attackHitbox.x - camX, this.attackHitbox.y, this.attackHitbox.w, this.attackHitbox.h);
        }

        super.draw(ctx, camX);
    }
    
    shoot(charge = 0) {
        if (this.attackCooldown > 0 && charge < 60) return;
        this.attackCooldown = 30;
        const projectileVx = this.facingRight ? 15 : -15;
        const size = charge > 60 ? 150 : (charge > 20 ? 110 : 80);
        const damage = charge > 60 ? 150 : (charge > 20 ? 80 : 40);
        
        const p = new Projectile(this.x + (this.facingRight ? this.w : 0), this.y + 40, projectileVx);
        p.w = size;
        p.h = size;
        p.damage = damage;
        projectiles.push(p);
    }

    // New method to update attack hitbox based on combo step
    updateAttackHitbox() {
        let hitboxX = 0;
        let hitboxY = this.y + 50;
        let hitboxW = 0;
        let hitboxH = 50;
        let damage = 10 + (this.comboStep * 5); // Base damage + bonus for combo steps

        switch(this.comboStep) {
            case 0: // First punch
                hitboxX = this.x + (this.facingRight ? 60 : -20);
                hitboxW = 100;
                hitboxH = 50;
                break;
            case 1: // Second punch
                hitboxX = this.x + (this.facingRight ? 70 : -30);
                hitboxW = 110;
                hitboxH = 60;
                damage = 15; // Specific damage for second hit
                break;
            case 2: // Third punch (uppercut)
                hitboxX = this.x + (this.facingRight ? 50 : -10);
                hitboxY = this.y + 20; // Higher for uppercut
                hitboxW = 100;
                hitboxH = 80;
                damage = 20; // Specific damage for third hit
                break;
            // Add more cases for additional combo steps if needed
            default:
                hitboxX = this.x + (this.facingRight ? 60 : -20);
                hitboxW = 100;
                hitboxH = 50;
                break;
        }

        this.attackHitbox = {
            x: hitboxX,
            y: hitboxY,
            w: hitboxW,
            h: hitboxH,
            damage: damage
        };
    }
}

class Enemy extends Entity {
    constructor(x, y) {
        super(x, y, 140, 190);
        this.health = 30; this.maxHealth = 30;
        this.sprite = { img: assets.cover, sx: 20, sy: 350, sWidth: 300, sHeight: 400 };
    }
    update(player) {
         if (this.isDead || this.hitStun > 0) { this.applyPhysics(); return; }
        let dist = player.x - this.x;
        if (Math.abs(dist) < 400) {
            if (Math.abs(dist) > 60) {
                this.vx += dist > 0 ? 0.3 : -0.3;
                this.facingRight = dist > 0;
            } else {
                 if (this.attackTimer <= 0) {
                    this.attackTimer = 120;
                    player.health -= 5;
                    player.hitStun = 15;
                    player.vx = this.facingRight ? 12 : -12;
                }
            }
        }
        if (this.attackTimer > 0) this.attackTimer--;
        this.applyPhysics();
    }
    draw(ctx, camX) {
        if (this.isDead) return;
        ctx.save();
        if (!this.facingRight) ctx.scale(-1, 1);
        const drawX = this.facingRight ? this.x - camX : -(this.x - camX) - this.w;
        if (!(this.hitStun > 0 && this.hitStun % 4 < 2)) {
            ctx.drawImage(this.sprite.img, this.sprite.sx, this.sprite.sy, this.sprite.sWidth, this.sprite.sHeight, drawX, this.y, this.w, this.h);
        }
        ctx.restore();
        super.draw(ctx, camX);
    }
}

class Projectile {
    constructor(x, y, vx) {
        this.x = x; this.y = y; this.vx = vx;
        this.w = 96; this.h = 96; // Increased size
        this.damage = 50;
        this.currentFrame = 0; this.frameTimer = 0;
        this.animation = animations.energyBlast;
    }
    update() {
        this.x += this.vx;
        if (this.animation.frames.length > 0) {
            this.frameTimer++;
            if (this.frameTimer >= this.animation.frameRate) {
                this.frameTimer = 0;
                this.currentFrame = (this.currentFrame + 1) % this.animation.frames.length;
            }
        }
    }
    draw(ctx, camX) {
        const frame = this.animation.frames[this.currentFrame];
        if (frame) ctx.drawImage(frame, this.x - camX, this.y, this.w, this.h);
    }
}


// --- GAME STATE ---
const player = new Player(100, 150);
const enemies = [];
const projectiles = [];
let waveCount = 0;
let currentLevelIndex = 0;
let currentLevel = levels[currentLevelIndex];
let isTransitioning = false;
let transitionAlpha = 0;

function spawnEnemy(x) {
    enemies.push(new Enemy(x, 150));
}
spawnEnemy(600);

// --- MAIN LOOP ---
function update() {
    player.update();
    
    let targetCamX = player.x - canvas.width * 0.3;
    if (targetCamX < 0) targetCamX = 0;
    // Restrict camera to not go beyond the level's width
    if (targetCamX > currentLevel.width - canvas.width) {
        targetCamX = currentLevel.width - canvas.width;
    }
    camera.x += (targetCamX - camera.x) * 0.1;

    // Level transition logic
    if (!isTransitioning && player.x > currentLevel.width - LEVEL_END_THRESHOLD) {
        if (currentLevelIndex < levels.length - 1) { // Check if there's a next level
            isTransitioning = true;
        }
    }

    if (isTransitioning) {
        if (transitionAlpha < 1 && currentLevelIndex < levels.length) { // Fading out
            transitionAlpha += 0.02;
            if (transitionAlpha >= 1) {
                transitionAlpha = 1;
                // Fully faded, switch to next level
                currentLevelIndex++;
                if (currentLevelIndex < levels.length) {
                    currentLevel = levels[currentLevelIndex];
                    player.x = 100; // Reset player position
                    player.y = 150;
                    camera.x = 0; // Reset camera
                } else {
                    // All levels completed, perhaps show game over screen or loop levels
                    // For now, let's just loop back to the first level
                    currentLevelIndex = 0;
                    currentLevel = levels[currentLevelIndex];
                    player.x = 100; // Reset player position
                    player.y = 150;
                    camera.x = 0; // Reset camera
                }
            }
        } else if (transitionAlpha > 0 && currentLevelIndex < levels.length) { // Fading in
            transitionAlpha -= 0.02;
            if (transitionAlpha <= 0) {
                transitionAlpha = 0;
                isTransitioning = false; // End transition
            }
        }
        return; // Pause game updates during transition
    }

    projectiles.forEach((p, i) => {
        p.update();
        if (p.x - camera.x > canvas.width || p.x < camera.x) {
            projectiles.splice(i, 1);
        }
    });
    
    enemies.forEach((enemy) => {
        if (enemy.health <= 0) {
            enemy.isDead = true;
            return;
        }
        enemy.update(player);
        // Collision detection
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            if (checkRectCollision(p, enemy)) {
                enemy.health -= p.damage;
                enemy.hitStun = 15;
                projectiles.splice(i, 1);
            }
        }
        if (player.isAttacking && player.attackHitbox && checkRectCollision(player.attackHitbox, enemy)) {
            enemy.health -= player.attackHitbox.damage;
            enemy.hitStun = 15;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Draw scrolling background
    const bgImage = currentLevel.background;
    const bgScaleX = bgImage.width / currentLevel.width;
    const bgSourceX = camera.x * bgScaleX;
    const bgSourceWidth = canvas.width * bgScaleX;
    
    ctx.drawImage(bgImage, bgSourceX, 0, bgSourceWidth, bgImage.height,
                  0, 0, canvas.width, canvas.height);
    player.draw(ctx, camera.x);
    enemies.forEach(e => e.draw(ctx, camera.x));
    projectiles.forEach(p => p.draw(ctx, camera.x));
    
    ctx.fillStyle = 'white';
    ctx.font = '20px Courier New';
    ctx.fillText("HP: " + player.health, 20, 30);
    if (player.health <= 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'red';
        ctx.font = '40px Courier New';
        ctx.fillText("YOU DIED", canvas.width / 2 - 100, canvas.height / 2);
    }

    // Draw transition overlay
    if (isTransitioning) {
        ctx.fillStyle = `rgba(0, 0, 0, ${transitionAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

function loop() {
    if (assetsLoaded === totalAssets) {
        // console.log("Game loop running..."); // Uncomment for extremely verbose logging
        update();
        draw();
    }
    requestAnimationFrame(loop);
}

// Don't start loop until assets are loaded
// loop(); is called from assetLoaded()

</script>
</body>
</html>
