    <script>
        /* ==================================================
         * GAME OVERVIEW: Urban Fury - Streets of Rage 2 inspired beat 'em up
         * 
         * Player controls a stylish hero fighting through waves of street enemies
         * using melee combat (punch/kick combos) and energy projectiles.
         * 
         * Edit Mode: Customize enemy waves, enemy properties, player stats, and game settings
         * Play Mode: Fight through 4 waves of enemies with increasing difficulty
         * 
         * GAME STATE SHAPE: window.gameConfig = {
         *   player: { startHealth, maxHealth, speed, punchDamage, kickDamage, energyDamage, energyCooldown },
         *   enemyTypes: { 
         *     thug: { health, speed, damage, attackRate, scoreValue },
         *     fast_attacker: { ... },
         *     brute: { ... }
         *   },
         *   waves: [
         *     { enemies: [{ type, spawnSide }], delay }
         *   ],
         *   settings: { healthPickupChance, comboTimeWindow, comboMultiplier }
         * }
         * ==================================================
         */

        // Game constants
        const CANVAS_WIDTH = 1280;
        const CANVAS_HEIGHT = 720;
        const LEVEL_WIDTH = 3840;
        const STREET_DEPTH_MIN = 480;
        const STREET_DEPTH_MAX = 620;
        
        // Game state
        let canvas, ctx;
        let gameMode = 'play';
        let gameState = 'playing'; // playing, victory, gameOver
        let assets = {};
        let audioContext;
        let audioBuffers = {};
        
        // Runtime game state (NOT in gameConfig)
        let player = null;
        let enemies = [];
        let projectiles = [];
        let healthPickups = [];
        let currentWave = 0;
        let waveDelay = 0;
        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        let lastFrameTime = 0;
        
        // Input state
        let keys = {};
        let touchState = {
            up: false, down: false, left: false, right: false,
            punch: false, kick: false, energy: false
        };
        
        // Camera
        let cameraX = 0;
        
        // UI Enhancement Functions
        function screenShake() {
            const container = document.getElementById('gameContainer');
            container.classList.add('screen-shake');
            setTimeout(() => container.classList.remove('screen-shake'), 300);
        }
        
        function flashScreen() {
            const flash = document.getElementById('flashOverlay');
            flash.classList.add('show');
            setTimeout(() => flash.classList.remove('show'), 100);
        }
        
        function updateComboDisplay() {
            const comboDisplay = document.getElementById('comboDisplay');
            if (combo > 1 && comboTimer > 0) {
                comboDisplay.textContent = 'COMBO x' + combo + '!';
                comboDisplay.classList.add('show');
            } else {
                comboDisplay.classList.remove('show');
            }
        }
        
        function checkLowHealth() {
            const healthContainer = document.getElementById('healthContainer');
            if (player && player.health < player.maxHealth * 0.3) {
                healthContainer.classList.add('low-health');
            } else {
                healthContainer.classList.remove('low-health');
            }
        }
        
        // Asset loading
        async function preloadAssets() {
            const assetIds = [
                'hero_idle', 'hero_walk', 'hero_run_1', 'hero_run_2', 'hero_run_3', 'hero_run_4', 'hero_punch', 'hero_punch_2', 'hero_punch_3', 'hero_punch_4', 'hero_punch_5', 'hero_punch_6', 'hero_kick', 'hero_kick_2', 'hero_kick_3', 'hero_kick_4', 'hero_hurt', 'hero_energy_blast',
                'energy_projectile',
                'thug_idle', 'thug_walk', 'thug_attack', 'thug_hurt', 'thug_defeated',
                'fast_attacker_idle', 'fast_attacker_walk', 'fast_attacker_attack', 'fast_attacker_hurt', 'fast_attacker_defeated',
                'brute_idle', 'brute_walk', 'brute_attack', 'brute_hurt', 'brute_defeated',
                'health_pickup',
                'background_street',
                'punch_hit_sfx', 'kick_hit_sfx', 'energy_blast_sfx', 'energy_hit_sfx',
                'player_hurt_sfx', 'enemy_hurt_sfx', 'enemy_defeated_sfx', 'health_pickup_sfx',
                'background_music', 'victory_music', 'game_over_music'
            ];
            
            let loaded = 0;
            const total = assetIds.length;
            
            const updateProgress = () => {
                const progress = (loaded / total) * 100;
                document.getElementById('loadingFill').style.width = progress + '%';
            };
            
            const promises = assetIds.map(id => {
                return new Promise((resolve) => {
                    const assetInfo = lib.getAsset(id);
                    if (!assetInfo) {
                        lib.log('Asset not found: ' + id);
                        // Don't fail on missing assets - just skip them
                        loaded++;
                        updateProgress();
                        resolve();
                        return;
                    }
                    
                    if (assetInfo.type === 'audio') {
                        fetch(assetInfo.url)
                            .then(response => response.arrayBuffer())
                            .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
                            .then(audioBuffer => {
                                audioBuffers[id] = audioBuffer;
                                loaded++;
                                updateProgress();
                                resolve();
                            })
                            .catch(err => {
                                lib.log('Error loading audio ' + id + ': ' + err);
                                loaded++;
                                updateProgress();
                                resolve();
                            });
                    } else {
                        const img = new Image();
                        img.onload = () => {
                            assets[id] = { img, ...assetInfo };
                            loaded++;
                            updateProgress();
                            resolve();
                        };
                        img.onerror = () => {
                            lib.log('Error loading image: ' + id);
                            loaded++;
                            updateProgress();
                            resolve();
                        };
                        img.src = assetInfo.url;
                    }
                });
            });
            
            await Promise.all(promises);
            document.getElementById('loadingScreen').style.display = 'none';
        }
        
        // Audio functions
        function playSound(id, loop = false) {
            if (!audioBuffers[id]) return null;
            
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffers[id];
            source.loop = loop;
            source.connect(audioContext.destination);
            source.start(0);
            return source;
        }
        
        let bgMusicSource = null;
        function playBackgroundMusic() {
            if (bgMusicSource) bgMusicSource.stop();
            bgMusicSource = playSound('background_music', true);
        }
        
        function stopBackgroundMusic() {
            if (bgMusicSource) {
                bgMusicSource.stop();
                bgMusicSource = null;
            }
        }
        
        // Helper functions
        function drawImage(assetId, x, y, width, height, flipX = false) {
            const asset = assets[assetId];
            if (!asset || !asset.img) return;
            
            ctx.save();
            if (flipX) {
                ctx.translate(x + width, y);
                ctx.scale(-1, 1);
                ctx.drawImage(asset.img, 0, 0, width, height);
            } else {
                ctx.drawImage(asset.img, x, y, width, height);
            }
            ctx.restore();
        }
        
        function getImageSize(assetId, targetHeight) {
            const asset = assets[assetId];
            if (!asset || !asset.aspect_ratio) return { width: targetHeight, height: targetHeight };
            
            const [aspectW, aspectH] = asset.aspect_ratio;
            const width = (targetHeight * aspectW) / aspectH;
            return { width, height: targetHeight };
        }
        
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y &&
                   Math.abs(a.z - b.z) < 40;
        }
        
        function distance(a, b) {
            const dx = a.x - b.x;
            const dz = a.z - b.z;
            return Math.sqrt(dx * dx + dz * dz);
        }
        
        // Energy Projectile class (defined before Player to avoid use-before-define)
        class EnergyProjectile {
            constructor(x, z, facingRight, blastSize = 'small') {
                this.x = x;
                this.z = z;
                this.facingRight = facingRight;
                this.blastSize = blastSize; // 'small', 'medium', 'large'
                this.remove = false;
                this.hitEnemies = new Set(); // Track which enemies we've hit
                this.lifetime = 0;
                this.maxLifetime = 5.0; // Projectile lasts up to 5 seconds
                
                // Size and damage scaling
                const sizeConfig = {
                    small: { width: 40, height: 40, damage: 1.0, speed: 600, knockback: 200 },
                    medium: { width: 60, height: 60, damage: 1.5, speed: 650, knockback: 300 },
                    large: { width: 90, height: 90, damage: 2.5, speed: 700, knockback: 400 }
                };
                
                const config = sizeConfig[blastSize];
                this.width = config.width;
                this.height = config.height;
                this.speed = config.speed;
                this.damageMultiplier = config.damage;
                this.knockbackForce = config.knockback;
            }
            
            update(dt) {
                this.lifetime += dt;
                this.x += (this.facingRight ? 1 : -1) * this.speed * dt;
                
                // Check collision with enemies
                enemies.forEach(enemy => {
                    if (enemy.state === 'defeated') return;
                    if (this.hitEnemies.has(enemy)) return; // Already hit this enemy
                    
                    // More lenient collision detection for projectiles
                    const dx = this.x - enemy.x;
                    const dz = this.z - enemy.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    const collisionDist = (this.width + enemy.width) / 2;
                    
                    if (dist < collisionDist) {
                        const damage = Math.floor(window.gameConfig.player.energyDamage * this.damageMultiplier);
                        enemy.takeDamage(damage, this.facingRight ? this.knockbackForce : -this.knockbackForce);
                        playSound('energy_hit_sfx');
                        screenShake();
                        this.hitEnemies.add(enemy); // Mark this enemy as hit
                    }
                });
                
                // Remove if off screen or lifetime exceeded
                if (this.x < -100 || this.x > LEVEL_WIDTH + 100 || this.lifetime > this.maxLifetime) {
                    this.remove = true;
                }
            }
            
            draw() {
                const screenX = this.x - cameraX;
                const screenY = this.z - this.height * 0.7; // Draw at chest level
                
                drawImage('energy_projectile', screenX - this.width / 2, screenY, this.width, this.height);
            }
        }
        
        // Health Pickup class (defined before Player to avoid use-before-define)
        class HealthPickup {
            constructor(x, z) {
                this.x = x;
                this.z = z;
                this.width = 40;
                this.height = 40;
                this.remove = false;
                this.bobTimer = 0;
            }
            
            update(dt) {
                this.bobTimer += dt * 3;
                
                // Check collision with player
                if (checkCollision(this, player)) {
                    player.health = Math.min(player.health + 30, player.maxHealth);
                    updateHUD();
                    playSound('health_pickup_sfx');
                    this.remove = true;
                }
            }
            
            draw() {
                const screenX = this.x - cameraX;
                const bobOffset = Math.sin(this.bobTimer) * 10;
                const screenY = this.z - this.height / 2 + bobOffset;
                
                drawImage('health_pickup', screenX - this.width / 2, screenY, this.width, this.height);
            }
        }
        
        // Player class
        class Player {
            constructor() {
                const config = window.gameConfig.player;
                this.x = CANVAS_WIDTH / 2;
                this.z = (STREET_DEPTH_MIN + STREET_DEPTH_MAX) / 2;
                this.width = 80;
                this.height = 120;
                this.health = config.startHealth;
                this.maxHealth = config.maxHealth;
                this.speed = config.speed;
                this.runSpeed = config.speed * 1.5; // Running is 1.5x faster
                this.facingRight = true;
                this.state = 'idle'; // idle, walking, running, punching, kicking, energy, hurt
                this.stateTimer = 0;
                this.invincible = false;
                this.invincibleTimer = 0;
                this.energyCooldown = 0;
                this.lastAttackType = null;
                this.punchCount = 0; // 0-5 for punch1-6 (boxing combo)
                this.kickCount = 0;  // 0-3 for kick1-4
                this.energyBlastCount = 0; // 0-2 for small, medium, large
                this.energyComboTimer = 0; // Timer for energy combo window
                this.isRunning = false; // Track if run button is held
            }
            
            update(dt) {
                this.stateTimer += dt;
                
                if (this.invincible) {
                    this.invincibleTimer -= dt;
                    if (this.invincibleTimer <= 0) {
                        this.invincible = false;
                    }
                }
                
                if (this.energyCooldown > 0) {
                    this.energyCooldown -= dt;
                    if (this.energyCooldown < 0) this.energyCooldown = 0;
                }
                
                if (this.energyComboTimer > 0) {
                    this.energyComboTimer -= dt;
                    if (this.energyComboTimer <= 0) {
                        this.energyBlastCount = 0;
                    }
                }
                
                // State transitions
                if (this.state === 'hurt' && this.stateTimer > 0.5) {
                    this.state = 'idle';
                }
                
                if (this.state === 'punching' && this.stateTimer > 0.3) {
                    this.state = 'idle';
                }
                
                if (this.state === 'kicking' && this.stateTimer > 0.4) {
                    this.state = 'idle';
                }
                
                if (this.state === 'energy' && this.stateTimer > 0.5) {
                    this.state = 'idle';
                }
                
                // Movement (only when not attacking or hurt)
                if (this.state === 'idle' || this.state === 'walking' || this.state === 'running') {
                    let moving = false;
                    let dx = 0, dz = 0;
                    
                    if (keys['ArrowLeft'] || keys['a'] || keys['A'] || touchState.left) {
                        dx -= 1;
                        this.facingRight = false;
                        moving = true;
                    }
                    if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchState.right) {
                        dx += 1;
                        this.facingRight = true;
                        moving = true;
                    }
                    if (keys['ArrowUp'] || keys['w'] || keys['W'] || touchState.up) {
                        dz -= 1;
                        moving = true;
                    }
                    if (keys['ArrowDown'] || keys['s'] || keys['S'] || touchState.down) {
                        dz += 1;
                        moving = true;
                    }
                    
                    if (dx !== 0 || dz !== 0) {
                        const len = Math.sqrt(dx * dx + dz * dz);
                        dx /= len;
                        dz /= len;
                        
                        // Use run speed if running, otherwise use normal speed
                        const currentSpeed = this.isRunning ? this.runSpeed : this.speed;
                        this.x += dx * currentSpeed * dt;
                        this.z += dz * currentSpeed * dt;
                        
                        // Clamp to screen bounds
                        this.x = Math.max(this.width / 2, Math.min(LEVEL_WIDTH - this.width / 2, this.x));
                        this.z = Math.max(STREET_DEPTH_MIN, Math.min(STREET_DEPTH_MAX, this.z));
                        
                        this.state = this.isRunning ? 'running' : 'walking';
                    } else {
                        this.state = 'idle';
                    }
                }
            }
            
            startRunning() {
                this.isRunning = true;
            }
            
            stopRunning() {
                this.isRunning = false;
            }
            
            punch() {
                if (this.state !== 'idle' && this.state !== 'walking' && this.state !== 'running') return;
                
                this.state = 'punching';
                this.stateTimer = 0;
                playSound('punch_hit_sfx');
                
                // Check combo
                if (this.lastAttackType === 'kick' && comboTimer > 0) {
                    combo++;
                    comboTimer = window.gameConfig.settings.comboTimeWindow;
                    this.punchCount = 0; // Reset punch chain when switching from kick
                } else if (this.lastAttackType === 'punch' && comboTimer > 0) {
                    combo++;
                    comboTimer = window.gameConfig.settings.comboTimeWindow;
                    this.punchCount = (this.punchCount + 1) % 6; // Cycle through 6 punches (boxing combo)
                } else {
                    combo = 1;
                    comboTimer = window.gameConfig.settings.comboTimeWindow;
                    this.punchCount = 0;
                }
                this.lastAttackType = 'punch';
                this.energyBlastCount = 0; // Reset energy combo
                this.energyComboTimer = 0;
                
                // Hit enemies
                this.hitEnemies(window.gameConfig.player.punchDamage, 100);
            }
            
            kick() {
                if (this.state !== 'idle' && this.state !== 'walking' && this.state !== 'running') return;
                
                this.state = 'kicking';
                this.stateTimer = 0;
                playSound('kick_hit_sfx');
                
                // Check combo
                if (this.lastAttackType === 'punch' && comboTimer > 0) {
                    combo++;
                    comboTimer = window.gameConfig.settings.comboTimeWindow;
                    this.kickCount = 0; // Reset kick chain when switching from punch
                } else if (this.lastAttackType === 'kick' && comboTimer > 0) {
                    combo++;
                    comboTimer = window.gameConfig.settings.comboTimeWindow;
                    this.kickCount = (this.kickCount + 1) % 4; // Cycle through 4 kicks
                } else {
                    combo = 1;
                    comboTimer = window.gameConfig.settings.comboTimeWindow;
                    this.kickCount = 0;
                }
                this.lastAttackType = 'kick';
                this.energyBlastCount = 0; // Reset energy combo
                this.energyComboTimer = 0;
                
                // Hit enemies
                this.hitEnemies(window.gameConfig.player.kickDamage, 150);
            }
            
            fireEnergy() {
                if (this.state !== 'idle' && this.state !== 'walking' && this.state !== 'running') return;
                
                // Allow rapid firing - only set state briefly for animation
                this.state = 'energy';
                this.stateTimer = 0;
                playSound('energy_blast_sfx');
                
                // Handle energy blast combo
                if (this.lastAttackType === 'energy' && this.energyComboTimer > 0) {
                    // Continue energy combo
                    this.energyBlastCount = (this.energyBlastCount + 1) % 3;
                } else {
                    // Start new energy combo
                    this.energyBlastCount = 0;
                }
                
                this.lastAttackType = 'energy';
                this.energyComboTimer = window.gameConfig.settings.comboTimeWindow;
                
                // Determine blast size based on combo count
                const blastSizes = ['small', 'medium', 'large'];
                const blastSize = blastSizes[this.energyBlastCount];
                
                // Create projectile at chest level
                projectiles.push(new EnergyProjectile(
                    this.x + (this.facingRight ? this.width / 2 : -this.width / 2),
                    this.z - this.height * 0.4,
                    this.facingRight,
                    blastSize
                ));
                
                // Set cooldown for visual feedback only (doesn't block firing)
                this.energyCooldown = window.gameConfig.player.energyCooldown;
            }
            
            hitEnemies(damage, knockback) {
                const attackRange = 80;
                const attackX = this.x + (this.facingRight ? this.width / 2 : -this.width / 2);
                
                let hitAny = false;
                enemies.forEach(enemy => {
                    if (enemy.state === 'defeated') return;
                    
                    const dist = distance(
                        { x: attackX, z: this.z },
                        { x: enemy.x, z: enemy.z }
                    );
                    
                    if (dist < attackRange) {
                        enemy.takeDamage(damage, this.facingRight ? knockback : -knockback);
                        hitAny = true;
                    }
                });
                
                if (hitAny) {
                    screenShake();
                }
            }
            
            takeDamage(damage) {
                if (this.invincible) return;
                
                this.health -= damage;
                this.state = 'hurt';
                this.stateTimer = 0;
                this.invincible = true;
                this.invincibleTimer = 1.0;
                playSound('player_hurt_sfx');
                
                // Visual feedback
                screenShake();
                flashScreen();
                
                if (this.health <= 0) {
                    this.health = 0;
                    gameOver();
                }
                
                updateHUD();
            }
            
            draw() {
                const screenX = this.x - cameraX;
                const screenY = this.z - this.height;
                
                // Draw shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.ellipse(screenX, this.z, this.width / 2, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Flicker when invincible
                if (this.invincible && Math.floor(this.invincibleTimer * 10) % 2 === 0) {
                    return;
                }
                
                // Select sprite based on state
                let spriteId = 'hero_idle';
                if (this.state === 'walking') {
                    // Use walk animation for normal movement
                    spriteId = 'hero_walk';
                }
                else if (this.state === 'running') {
                    // Cycle through running animation frames
                    const runSprites = ['hero_run_1', 'hero_run_2', 'hero_run_3', 'hero_run_4'];
                    const frameIndex = Math.floor((this.stateTimer * 12) % runSprites.length);
                    spriteId = runSprites[frameIndex];
                }
                else if (this.state === 'punching') {
                    const punchSprites = ['hero_punch', 'hero_punch_2', 'hero_punch_3', 'hero_punch_4', 'hero_punch_5', 'hero_punch_6'];
                    spriteId = punchSprites[this.punchCount];
                }
                else if (this.state === 'kicking') {
                    const kickSprites = ['hero_kick', 'hero_kick_2', 'hero_kick_3', 'hero_kick_4'];
                    spriteId = kickSprites[this.kickCount];
                }
                else if (this.state === 'hurt') spriteId = 'hero_hurt';
                else if (this.state === 'energy') spriteId = 'hero_energy_blast';
                
                drawImage(spriteId, screenX - this.width / 2, screenY, this.width, this.height, !this.facingRight);
            }
        }
        
        // Enemy class
        class Enemy {
            constructor(type, spawnSide) {
                this.type = type;
                const config = window.gameConfig.enemyTypes[type];
                
                this.x = spawnSide === 'left' ? -50 : LEVEL_WIDTH + 50;
                this.z = STREET_DEPTH_MIN + Math.random() * (STREET_DEPTH_MAX - STREET_DEPTH_MIN);
                
                const sizes = {
                    thug: { width: 70, height: 100 },
                    fast_attacker: { width: 65, height: 100 },
                    brute: { width: 90, height: 140 }
                };
                this.width = sizes[type].width;
                this.height = sizes[type].height;
                
                this.health = config.health;
                this.maxHealth = config.health;
                this.speed = config.speed;
                this.damage = config.damage;
                this.attackRate = config.attackRate;
                this.scoreValue = config.scoreValue;
                
                this.state = 'walking'; // walking, attacking, hurt, defeated
                this.stateTimer = 0;
                this.attackTimer = 0;
                this.facingRight = spawnSide === 'left';
                this.defeatTimer = 0;
            }
            
            update(dt) {
                this.stateTimer += dt;
                this.attackTimer += dt;
                
                if (this.state === 'defeated') {
                    this.defeatTimer += dt;
                    if (this.defeatTimer > 2.0) {
                        // Mark for removal
                        this.remove = true;
                    }
                    return;
                }
                
                if (this.state === 'hurt' && this.stateTimer > 0.4) {
                    this.state = 'walking';
                }
                
                if (this.state === 'attacking' && this.stateTimer > 0.6) {
                    this.state = 'walking';
                }
                
                if (this.state === 'walking') {
                    // Move toward player
                    const dx = player.x - this.x;
                    const dz = player.z - this.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist > 60) {
                        // Move toward player
                        this.x += (dx / dist) * this.speed * dt;
                        this.z += (dz / dist) * this.speed * dt;
                        this.facingRight = dx > 0;
                    } else if (this.attackTimer > this.attackRate) {
                        // Attack
                        this.state = 'attacking';
                        this.stateTimer = 0;
                        this.attackTimer = 0;
                        
                        // Deal damage to player
                        if (distance(this, player) < 70) {
                            player.takeDamage(this.damage);
                        }
                    }
                }
            }
            
            takeDamage(damage, knockback) {
                if (this.state === 'defeated') return;
                
                this.health -= damage;
                this.state = 'hurt';
                this.stateTimer = 0;
                this.x += knockback;
                playSound('enemy_hurt_sfx');
                
                if (this.health <= 0) {
                    this.health = 0;
                    this.state = 'defeated';
                    this.defeatTimer = 0;
                    playSound('enemy_defeated_sfx');
                    
                    // Add score with combo multiplier
                    const multiplier = combo > 1 ? window.gameConfig.settings.comboMultiplier : 1;
                    score += Math.floor(this.scoreValue * multiplier);
                    updateHUD();
                    
                    // Chance to drop health pickup
                    if (Math.random() < window.gameConfig.settings.healthPickupChance) {
                        healthPickups.push(new HealthPickup(this.x, this.z));
                    }
                }
            }
            
            draw() {
                const screenX = this.x - cameraX;
                const screenY = this.z - this.height;
                
                // Draw shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.ellipse(screenX, this.z, this.width / 2, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Select sprite
                let spriteId = this.type + '_idle';
                if (this.state === 'walking') spriteId = this.type + '_walk';
                else if (this.state === 'attacking') spriteId = this.type + '_attack';
                else if (this.state === 'hurt') spriteId = this.type + '_hurt';
                else if (this.state === 'defeated') spriteId = this.type + '_defeated';
                
                drawImage(spriteId, screenX - this.width / 2, screenY, this.width, this.height, !this.facingRight);
                
                // Health bar
                if (this.state !== 'defeated' && this.health < this.maxHealth) {
                    const barWidth = this.width;
                    const barHeight = 6;
                    const barX = screenX - barWidth / 2;
                    const barY = screenY - 15;
                    
                    ctx.fillStyle = 'rgba(100,0,0,0.8)';
                    ctx.fillRect(barX, barY, barWidth, barHeight);
                    
                    ctx.fillStyle = 'rgba(0,255,0,0.8)';
                    ctx.fillRect(barX, barY, barWidth * (this.health / this.maxHealth), barHeight);
                }
            }
        }

        
        // Wave management
        function spawnWave(waveIndex) {
            const wave = window.gameConfig.waves[waveIndex];
            if (!wave) return;
            
            wave.enemies.forEach((enemyDef, index) => {
                setTimeout(() => {
                    enemies.push(new Enemy(enemyDef.type, enemyDef.spawnSide));
                }, index * 500);
            });
        }
        
        function checkWaveComplete() {
            if (enemies.length === 0 && waveDelay <= 0) {
                currentWave++;
                
                if (currentWave >= window.gameConfig.waves.length) {
                    victory();
                } else {
                    waveDelay = window.gameConfig.waves[currentWave].delay;
                    updateHUD();
                }
            }
        }
        
        // Game state functions
        function victory() {
            gameState = 'victory';
            stopBackgroundMusic();
            playSound('victory_music');
            document.getElementById('victoryScore').textContent = 'FINAL SCORE: ' + score;
            document.getElementById('victoryScreen').classList.add('show');
        }
        
        function gameOver() {
            gameState = 'gameOver';
            stopBackgroundMusic();
            playSound('game_over_music');
            document.getElementById('gameOverScore').textContent = 'FINAL SCORE: ' + score;
            document.getElementById('gameOverScreen').classList.add('show');
        }
        
        function restartGame() {
            // Reset game state
            gameState = 'playing';
            enemies = [];
            projectiles = [];
            healthPickups = [];
            currentWave = 0;
            waveDelay = 0;
            score = 0;
            combo = 0;
            comboTimer = 0;
            
            // Reset player
            player = new Player();
            
            // Hide overlays
            document.getElementById('victoryScreen').classList.remove('show');
            document.getElementById('gameOverScreen').classList.remove('show');
            
            // Start first wave
            spawnWave(0);
            updateHUD();
            playBackgroundMusic();
        }
        
        // HUD updates
        function updateHUD() {
            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('healthFill').style.width = healthPercent + '%';
            document.getElementById('score').textContent = 'SCORE: ' + score;
            document.getElementById('waveInfo').textContent = 'WAVE ' + (currentWave + 1) + '/' + window.gameConfig.waves.length;
            
            // Update combo display
            updateComboDisplay();
            
            // Check low health
            checkLowHealth();
            
            // Update energy cooldown
            const energyBtn = document.getElementById('energyBtn');
            const cooldownDiv = document.getElementById('energyCooldown');
            if (player && player.energyCooldown > 0) {
                energyBtn.classList.add('cooldown');
                const percent = (player.energyCooldown / window.gameConfig.player.energyCooldown) * 360;
                cooldownDiv.style.background = 'conic-gradient(rgba(0,0,0,0.85) ' + percent + 'deg, transparent ' + percent + 'deg)';
            } else {
                energyBtn.classList.remove('cooldown');
                cooldownDiv.style.background = 'none';
            }
        }
        
        // Game loop
        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.11);
            lastFrameTime = timestamp;
            
            if (gameState === 'playing') {
                // Update combo timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        combo = 0;
                        updateComboDisplay();
                    }
                }
                
                // Update wave delay
                if (waveDelay > 0) {
                    waveDelay -= dt;
                    if (waveDelay <= 0) {
                        spawnWave(currentWave);
                    }
                }
                
                // Update entities
                player.update(dt);
                enemies.forEach(e => e.update(dt));
                projectiles.forEach(p => p.update(dt));
                healthPickups.forEach(h => h.update(dt));
                
                // Remove marked entities
                enemies = enemies.filter(e => !e.remove);
                projectiles = projectiles.filter(p => !p.remove);
                healthPickups = healthPickups.filter(h => !h.remove);
                
                // Check wave completion
                checkWaveComplete();
                
                // Update camera
                cameraX = Math.max(0, Math.min(LEVEL_WIDTH - CANVAS_WIDTH, player.x - CANVAS_WIDTH / 2));
                
                updateHUD();
            }
            
            // Render
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw background
            if (assets['background_street']) {
                const bgAsset = assets['background_street'];
                const bgWidth = LEVEL_WIDTH;
                const bgHeight = CANVAS_HEIGHT;
                ctx.drawImage(bgAsset.img, -cameraX, 0, bgWidth, bgHeight);
            }
            
            // Collect all drawable entities and sort by depth
            const drawables = [
                player,
                ...enemies,
                ...projectiles,
                ...healthPickups
            ].sort((a, b) => a.z - b.z);
            
            // Draw all entities
            drawables.forEach(entity => entity.draw());
            
            requestAnimationFrame(gameLoop);
        }
        
        // Input handling
        function setupInput() {
            // Keyboard
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                
                if (gameState !== 'playing') return;
                
                if (e.key === 'j' || e.key === 'J' || e.key === 'z' || e.key === 'Z' || e.key === ' ') {
                    player.punch();
                }
                if (e.key === 'k' || e.key === 'K' || e.key === 'x' || e.key === 'X') {
                    player.kick();
                }
                if (e.key === 'l' || e.key === 'L' || e.key === 'c' || e.key === 'C') {
                    player.fireEnergy();
                }
                if (e.key === 'Shift') {
                    player.startRunning();
                }
            });
            
            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
                if (e.key === 'Shift') {
                    player.stopRunning();
                }
            });
            
            // Touch controls
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (isTouchDevice) {
                document.getElementById('touchControls').style.display = 'block';
                
                // D-pad
                const setupDpadButton = (id, direction) => {
                    const btn = document.getElementById(id);
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        touchState[direction] = true;
                        btn.classList.add('active');
                    });
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        touchState[direction] = false;
                        btn.classList.remove('active');
                    });
                    btn.addEventListener('touchcancel', (e) => {
                        e.preventDefault();
                        touchState[direction] = false;
                        btn.classList.remove('active');
                    });
                };
                
                setupDpadButton('dpadUp', 'up');
                setupDpadButton('dpadDown', 'down');
                setupDpadButton('dpadLeft', 'left');
                setupDpadButton('dpadRight', 'right');
                
                // Action buttons
                const setupActionButton = (id, action) => {
                    const btn = document.getElementById(id);
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (gameState !== 'playing') return;
                        btn.classList.add('active');
                        action();
                    });
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        btn.classList.remove('active');
                    });
                    btn.addEventListener('touchcancel', (e) => {
                        e.preventDefault();
                        btn.classList.remove('active');
                    });
                };
                
                setupActionButton('punchBtn', () => player.punch());
                setupActionButton('kickBtn', () => player.kick());
                
                // Run button - toggle on/off
                const runBtn = document.getElementById('runBtn');
                runBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (gameState !== 'playing') return;
                    runBtn.classList.add('active');
                    player.startRunning();
                });
                runBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    runBtn.classList.remove('active');
                    player.stopRunning();
                });
                runBtn.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    runBtn.classList.remove('active');
                    player.stopRunning();
                });
                
                setupActionButton('energyBtn', () => player.fireEnergy());
            }
            
            // Restart buttons
            document.getElementById('playAgainBtn').addEventListener('click', restartGame);
            document.getElementById('tryAgainBtn').addEventListener('click', restartGame);
        }
        
        // Main run function
        async function run(mode) {
            lib.log('run() called. Mode: ' + mode);
            gameMode = mode;
            
            // Initialize canvas
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            
            // Initialize audio context
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // Show game parameters
            lib.showGameParameters({
                name: 'Game Settings',
                params: {
                    'Player Health': {
                        key: 'gameConfig.player.startHealth',
                        type: 'slider',
                        min: 50,
                        max: 200,
                        step: 10,
                        onChange: (value) => {
                            window.gameConfig.player.startHealth = value;
                            window.gameConfig.player.maxHealth = value;
                            if (player) {
                                player.maxHealth = value;
                                player.health = Math.min(player.health, value);
                                updateHUD();
                            }
                        }
                    },
                    'Player Speed': {
                        key: 'gameConfig.player.speed',
                        type: 'slider',
                        min: 100,
                        max: 400,
                        step: 20,
                        onChange: (value) => {
                            window.gameConfig.player.speed = value;
                            if (player) player.speed = value;
                        }
                    },
                    'Energy Cooldown': {
                        key: 'gameConfig.player.energyCooldown',
                        type: 'slider',
                        min: 1,
                        max: 8,
                        step: 0.5,
                        onChange: (value) => {
                            window.gameConfig.player.energyCooldown = value;
                        }
                    },
                    'Health Pickup Chance': {
                        key: 'gameConfig.settings.healthPickupChance',
                        type: 'slider',
                        min: 0,
                        max: 1,
                        step: 0.1,
                        onChange: (value) => {
                            window.gameConfig.settings.healthPickupChance = value;
                        }
                    },
                    'Difficulty': {
                        key: 'gameConfig.difficulty',
                        type: 'dropdown',
                        options: [
                            { label: 'Easy', value: 'easy' },
                            { label: 'Normal', value: 'normal' },
                            { label: 'Hard', value: 'hard' }
                        ],
                        onChange: (value) => {
                            window.gameConfig.difficulty = value;
                            // Adjust enemy stats based on difficulty
                            const multipliers = { easy: 0.7, normal: 1.0, hard: 1.5 };
                            const mult = multipliers[value];
                            Object.keys(window.gameConfig.enemyTypes).forEach(type => {
                                const base = window.gameConfig.enemyTypes[type];
                                base.health = Math.floor(base.health * mult);
                                base.damage = Math.floor(base.damage * mult);
                            });
                        }
                    }
                }
            });
            
            // Load assets
            await preloadAssets();
            
            // Setup input
            setupInput();
            
            if (mode === 'play') {
                // Initialize game
                player = new Player();
                spawnWave(0);
                playBackgroundMusic();
                
                // Start game loop
                lastFrameTime = performance.now();
                requestAnimationFrame(gameLoop);
            } else {
                // Edit mode - show wave editor
                lib.log('Edit mode not fully implemented - showing play mode for now');
                player = new Player();
                spawnWave(0);
                
                lastFrameTime = performance.now();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
