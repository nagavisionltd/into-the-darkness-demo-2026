<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Urban Fury</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        /* ============================================
           CSS RESET & BASE STYLES
           ============================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #000;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* ============================================
           CSS CUSTOM PROPERTIES
           ============================================ */
        :root {
            /* Colors */
            --color-neon-cyan: #00f3ff;
            --color-neon-magenta: #ff00ff;
            --color-neon-yellow: #ffff00;
            --color-neon-orange: #ff6600;
            --color-danger: #ff0044;
            --color-success: #00ff88;
            --color-dark-base: #0a0a0f;
            --color-glass-white: rgba(255, 255, 255, 0.1);
            --color-glass-border: rgba(255, 255, 255, 0.2);
            
            /* Shadows & Glows */
            --glow-cyan: 0 0 20px rgba(0, 243, 255, 0.6);
            --glow-magenta: 0 0 20px rgba(255, 0, 255, 0.6);
            --glow-yellow: 0 0 20px rgba(255, 255, 0, 0.6);
            --glow-orange: 0 0 20px rgba(255, 102, 0, 0.6);
            --shadow-deep: 0 8px 32px rgba(0, 0, 0, 0.8);
            --shadow-medium: 0 4px 16px rgba(0, 0, 0, 0.6);
            
            /* Spacing */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            
            /* Animation Timings */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
            --transition-slow: 500ms;
            --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }
        
        /* ============================================
           GAME CONTAINER & CANVAS
           ============================================ */
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* Scanline effect overlay */
        #gameContainer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 3px
            );
            pointer-events: none;
            z-index: 5;
            opacity: 0.3;
        }
        
        /* ============================================
           HUD SYSTEM
           ============================================ */
        #hud {
            position: absolute;
            top: var(--space-sm);
            left: var(--space-sm);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            pointer-events: none;
            z-index: 10;
            max-width: 400px;
        }
        
        .hud-panel {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid var(--color-neon-cyan);
            border-radius: 12px;
            padding: var(--space-sm);
            box-shadow: var(--shadow-deep), inset 0 0 20px rgba(0, 243, 255, 0.1);
        }
        
        #healthContainer {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }
        
        #healthLabel {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--color-neon-cyan);
            text-shadow: var(--glow-cyan);
            letter-spacing: 2px;
        }
        
        #healthBar {
            width: 100%;
            height: 24px;
            background: rgba(100, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        
        #healthFill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-danger) 0%, var(--color-neon-yellow) 50%, var(--color-success) 100%);
            transition: width var(--transition-normal) var(--ease-out);
            position: relative;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        #healthFill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3), transparent);
        }
        
        #statsContainer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-sm);
        }
        
        #score, #waveInfo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: var(--color-neon-cyan);
            text-shadow: var(--glow-cyan);
            letter-spacing: 2px;
        }
        
        #waveInfo {
            color: var(--color-neon-magenta);
            text-shadow: var(--glow-magenta);
        }
        
        /* Low health warning */
        @keyframes healthWarning {
            0%, 100% { 
                border-color: var(--color-danger);
                box-shadow: var(--shadow-deep), inset 0 0 20px rgba(255, 0, 68, 0.3);
            }
            50% { 
                border-color: var(--color-neon-yellow);
                box-shadow: var(--shadow-deep), inset 0 0 30px rgba(255, 255, 0, 0.5);
            }
        }
        
        .hud-panel.low-health {
            animation: healthWarning 1s ease-in-out infinite;
        }
        
        /* ============================================
           COMBO DISPLAY
           ============================================ */
        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%) scale(0);
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            color: var(--color-neon-yellow);
            text-shadow: 
                0 0 10px var(--color-neon-yellow),
                0 0 20px var(--color-neon-yellow),
                0 0 30px var(--color-neon-yellow),
                4px 4px 8px rgba(0, 0, 0, 0.9);
            opacity: 0;
            transition: all var(--transition-normal) var(--ease-bounce);
            pointer-events: none;
            z-index: 15;
            letter-spacing: 4px;
        }
        
        #comboDisplay.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        
        @keyframes comboPulse {
            0%, 100% { transform: translateX(-50%) translateY(-50%) scale(1); }
            50% { transform: translateX(-50%) translateY(-50%) scale(1.1); }
        }
        
        #comboDisplay.show {
            animation: comboPulse 0.5s ease-in-out infinite;
        }
        
        /* ============================================
           TOUCH CONTROLS
           ============================================ */
        #touchControls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        
        /* D-Pad Container */
        #dpad {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 200px;
            height: 200px;
            pointer-events: auto;
        }
        
        .dpad-button {
            position: absolute;
            width: 64px;
            height: 64px;
            background: rgba(0, 243, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 3px solid var(--color-neon-cyan);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--color-neon-cyan);
            text-shadow: var(--glow-cyan);
            user-select: none;
            touch-action: none;
            transition: all var(--transition-fast) var(--ease-out);
            box-shadow: 
                var(--shadow-medium),
                inset 0 0 20px rgba(0, 243, 255, 0.1);
        }
        
        .dpad-button:active,
        .dpad-button.active {
            background: rgba(0, 243, 255, 0.4);
            transform: scale(0.92);
            box-shadow: 
                0 0 20px rgba(0, 243, 255, 0.8),
                inset 0 0 30px rgba(0, 243, 255, 0.3);
        }
        
        #dpadUp { top: 0; left: 68px; }
        #dpadDown { bottom: 0; left: 68px; }
        #dpadLeft { top: 68px; left: 0; }
        #dpadRight { top: 68px; right: 0; }
        
        /* Action Buttons Container */
        #actionButtons {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 280px;
            height: 220px;
            pointer-events: auto;
        }
        
        .action-button {
            position: absolute;
            width: 96px;
            height: 96px;
            backdrop-filter: blur(8px);
            border: 4px solid;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            user-select: none;
            touch-action: none;
            transition: all var(--transition-fast) var(--ease-out);
            box-shadow: var(--shadow-medium);
        }
        
        .action-button:active,
        .action-button.active {
            transform: scale(0.92);
        }
        
        /* Punch Button - Orange */
        #punchBtn {
            bottom: 0;
            right: 0;
            background: rgba(255, 102, 0, 0.25);
            border-color: var(--color-neon-orange);
        }
        
        #punchBtn:active,
        #punchBtn.active {
            background: rgba(255, 102, 0, 0.5);
            box-shadow: 
                0 0 30px rgba(255, 102, 0, 0.9),
                var(--shadow-medium);
        }
        
        /* Kick Button - Yellow */
        #kickBtn {
            bottom: 0;
            right: 112px;
            background: rgba(255, 255, 0, 0.25);
            border-color: var(--color-neon-yellow);
        }
        
        #kickBtn:active,
        #kickBtn.active {
            background: rgba(255, 255, 0, 0.5);
            box-shadow: 
                0 0 30px rgba(255, 255, 0, 0.9),
                var(--shadow-medium);
        }
        
        /* Energy Button - Cyan */
        #energyBtn {
            bottom: 112px;
            right: 56px;
            background: rgba(0, 243, 255, 0.25);
            border-color: var(--color-neon-cyan);
            position: relative;
        }
        
        #energyBtn:active,
        #energyBtn.active {
            background: rgba(0, 243, 255, 0.5);
            box-shadow: 
                0 0 30px rgba(0, 243, 255, 0.9),
                var(--shadow-medium);
        }
        
        #energyBtn.cooldown {
            opacity: 0.4;
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* Run Button - Green */
        #runBtn {
            bottom: 112px;
            right: 168px;
            background: rgba(0, 255, 136, 0.25);
            border-color: var(--color-success);
        }
        
        #runBtn:active,
        #runBtn.active {
            background: rgba(0, 255, 136, 0.5);
            box-shadow: 
                0 0 30px rgba(0, 255, 136, 0.9),
                var(--shadow-medium);
        }
        
        #energyCooldown {
            position: absolute;
            top: -4px;
            left: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border-radius: 50%;
            background: conic-gradient(
                rgba(0, 0, 0, 0.85) 0deg,
                transparent 0deg
            );
            pointer-events: none;
            transition: background var(--transition-fast) linear;
        }
        
        /* ============================================
           OVERLAYS (Victory, Game Over, Loading)
           ============================================ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: var(--space-lg);
            opacity: 0;
            transition: opacity var(--transition-slow) var(--ease-out);
        }
        
        .overlay.show {
            display: flex;
            animation: overlayFadeIn var(--transition-slow) var(--ease-out) forwards;
        }
        
        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .overlay h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 96px;
            font-weight: 900;
            margin: 0 0 var(--space-lg) 0;
            letter-spacing: 8px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .overlay p {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            margin: var(--space-sm) 0;
            letter-spacing: 4px;
        }
        
        .overlay button {
            margin-top: var(--space-xl);
            padding: var(--space-md) var(--space-xl);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 3px;
            background: rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
            color: var(--color-neon-cyan);
            border: 4px solid var(--color-neon-cyan);
            border-radius: 16px;
            cursor: pointer;
            text-shadow: var(--glow-cyan);
            box-shadow: 
                var(--shadow-deep),
                inset 0 0 20px rgba(0, 243, 255, 0.1);
            pointer-events: auto;
            transition: all var(--transition-normal) var(--ease-out);
        }
        
        .overlay button:hover {
            background: rgba(0, 243, 255, 0.3);
            box-shadow: 
                0 0 40px rgba(0, 243, 255, 0.8),
                var(--shadow-deep),
                inset 0 0 30px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .overlay button:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 
                0 0 20px rgba(0, 243, 255, 0.6),
                var(--shadow-medium);
        }
        
        /* Victory Screen */
        #victoryScreen h1 {
            color: var(--color-neon-yellow);
            text-shadow: 
                0 0 20px var(--color-neon-yellow),
                0 0 40px var(--color-neon-yellow),
                0 0 60px var(--color-neon-yellow);
        }
        
        #victoryScreen p {
            color: var(--color-success);
            text-shadow: var(--glow-cyan);
        }
        
        /* Game Over Screen */
        #gameOverScreen h1 {
            color: var(--color-danger);
            text-shadow: 
                0 0 20px var(--color-danger),
                0 0 40px var(--color-danger),
                0 0 60px var(--color-danger);
        }
        
        #gameOverScreen p {
            color: var(--color-neon-magenta);
            text-shadow: var(--glow-magenta);
        }
        
        #gameOverScreen button {
            border-color: var(--color-neon-magenta);
            color: var(--color-neon-magenta);
            background: rgba(255, 0, 255, 0.2);
        }
        
        #gameOverScreen button:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 
                0 0 40px rgba(255, 0, 255, 0.8),
                var(--shadow-deep);
        }
        
        /* ============================================
           LOADING SCREEN
           ============================================ */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--color-dark-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
            gap: var(--space-lg);
        }
        
        #loadingScreen h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: var(--color-neon-cyan);
            text-shadow: 
                0 0 20px var(--color-neon-cyan),
                0 0 40px var(--color-neon-cyan);
            letter-spacing: 8px;
            margin-bottom: var(--space-md);
            animation: loadingPulse 2s ease-in-out infinite;
        }
        
        @keyframes loadingPulse {
            0%, 100% { 
                text-shadow: 
                    0 0 20px var(--color-neon-cyan),
                    0 0 40px var(--color-neon-cyan);
            }
            50% { 
                text-shadow: 
                    0 0 30px var(--color-neon-cyan),
                    0 0 60px var(--color-neon-cyan),
                    0 0 80px var(--color-neon-cyan);
            }
        }
        
        #loadingBar {
            width: 400px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid var(--color-neon-cyan);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                var(--shadow-deep),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        #loadingFill {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--color-neon-cyan) 0%, 
                var(--color-neon-magenta) 50%,
                var(--color-neon-yellow) 100%
            );
            width: 0%;
            transition: width var(--transition-normal) var(--ease-out);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.8);
            position: relative;
        }
        
        #loadingFill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4), transparent);
        }
        
        #loadingScreen p {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--color-neon-cyan);
            letter-spacing: 3px;
            animation: loadingDots 1.5s ease-in-out infinite;
        }
        
        @keyframes loadingDots {
            0%, 20% { content: 'Loading'; }
            40% { content: 'Loading.'; }
            60% { content: 'Loading..'; }
            80%, 100% { content: 'Loading...'; }
        }
        
        /* ============================================
           VISUAL EFFECTS
           ============================================ */
        
        /* Screen shake effect */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, -2px); }
            40% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, 2px); }
            60% { transform: translate(2px, -2px); }
            70% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            90% { transform: translate(-2px, 2px); }
        }
        
        .screen-shake {
            animation: screenShake 0.3s ease-in-out;
        }
        
        /* Flash overlay for damage */
        #flashOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 0, 68, 0.3);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
            transition: opacity var(--transition-fast);
        }
        
        #flashOverlay.show {
            opacity: 1;
        }
        
        /* ============================================
           RESPONSIVE ADJUSTMENTS
           ============================================ */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>

// Astrocade error handlers

// Disable context menu (right-click/long-press)
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();

document.addEventListener('dragstart', function(e) {

// Intercept console.error calls
(function() {
    const originalConsoleError = console.error;
    console.error = function(...args) {
        // Call original console.error
        originalConsoleError.apply(console, args);
        
        // Report to parent
        window.parent.postMessage({ 
            type: 'GAME_ERROR', 
            error: {
                message: args.map(arg => {
                    if (typeof arg === 'object') {
                        try {
                            return JSON.stringify(arg);
                        } catch (e) {
                            return String(arg);
                        }
                    }
                    return String(arg);
                }).join(' '),
                timestamp: Date.now()
            }
        }, '*');
    };
})();

window.addEventListener('error', function(event) {
    // Report error back to parent for UI display
    window.parent.postMessage({ 
        type: 'GAME_ERROR', 
        error: {
            message: event.message || 'Unknown error',
            stack: event.error?.stack,
            line: event.lineno,
            column: event.colno,
            filename: event.filename,
            timestamp: Date.now()
        }
    }, '*');
});

window.addEventListener('unhandledrejection', function(event) {
    // Report promise rejection back to parent
    window.parent.postMessage({ 
        type: 'GAME_ERROR', 
        error: {
            message: 'Unhandled promise rejection',
            reason: String(event.reason),
            timestamp: Date.now()
        }
    }, '*');
});

            };
        }
        let fpsUpdate = createRunningFpsTracker();
        let lastFpsUpdateTime = performance.now();
        let lastFpsReportTime = performance.now();
        let gameLoadStartTime = null; // Track when game loads in play mode
        const FPS_REPORT_INTERVAL = 1000; // Report FPS every 1 second
        const FPS_INITIAL_DELAY = 5000; // Don't log FPS for the first 5 seconds
        function resetFpsTracking(currentTime) {
            fpsUpdate = createRunningFpsTracker();
            lastFpsUpdateTime = currentTime;
            lastFpsReportTime = currentTime;
        }
        const trackFps = (currentTime) => {
            const dt = currentTime - lastFpsUpdateTime;
            lastFpsUpdateTime = currentTime;
            // Only track FPS in play mode and after initial delay
            const shouldTrack = currentMode === 'play' &&
                gameLoadStartTime !== null &&
                (currentTime - gameLoadStartTime) >= FPS_INITIAL_DELAY;
            if (shouldTrack) {
                const fpsStats = fpsUpdate(dt);
                // Report FPS at intervals
                const timeSinceLastReport = currentTime - lastFpsReportTime;
                if (shouldTrack && timeSinceLastReport >= FPS_REPORT_INTERVAL) {
                    // Send FPS to parent
                    window.parent.postMessage({
                        type: 'GAME_FPS_UPDATE',
                        fps: (1000 / fpsStats.mean).toFixed(0),
                        fpsStd: fpsStats.stdDev.toFixed(2),
                        fpsSamples: fpsStats.n,
                        timestamp: currentTime
                    }, '*');
                    // Reset counters
                    resetFpsTracking(currentTime);
                }
            }
            else {
                lastFpsReportTime = currentTime;
            }
            requestAnimationFrame(trackFps);
        };
        // reset fps counting when we return from focus/visibility change:
        window.addEventListener('focus', () => { resetFpsTracking(performance.now()); });
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                resetFpsTracking(performance.now());
            }
        });
        // Start FPS tracking
        requestAnimationFrame(trackFps);
        // The internal message listener that drives the game.
        window.addEventListener('message', async (event) => {
            if (!event.data || !event.data.type)
                return;
            const message = event.data;
            let ackMessage;
            try {
                switch (message.type) {
                    case 'PREPARE_FOR_RELOAD': {
                        // Flush any pending commits before switching modes/reloading
                        flushPendingCommits();
                        break;
                    }
                    case 'RUN_WITH_CONFIG': {
                        // Clear callbacks when reloading
                        callbackManager.clear();
                        const { gameConfig, mode, gameMetadata: metadata, hideClickToPlayOverlay, runId } = message;
                        // Store game metadata for overlay and leaderboard
                        gameMetadata = metadata || null;
                        // Update current mode
                        currentMode = mode || 'play';
                        // Set game load start time for FPS tracking (only in play mode)
                        if (currentMode === 'play') {
                            gameLoadStartTime = performance.now();
                        }
                        else {
                            gameLoadStartTime = null;
                        }
                        // Create proxied config for automatic change detection
                        window.gameConfig = createProxiedConfig(gameConfig);
                        window.mode = mode;
                        // Send initial state if in edit mode (live update only, no commit)
                        if (currentMode === 'edit' && gameConfig) {
                            // Send live update immediately to sync UI
                            // Use sendLiveUpdate which handles serialization
                            sendLiveUpdate();
                            // DO NOT send commit - the parent already has the committed state
                            // This prevents duplicate commits during undo/redo operations
                        }
                        // Check if run function exists
                        // eslint-disable-next-line @typescript-eslint/no-explicit-any
                        const windowWithRun = window;
                        // Function to actually run the game
                        const executeRun = async () => {
                            if (typeof windowWithRun.run === 'function') {
                                try {
                                    // IMPORTANT: run() only takes mode. window.gameConfig is already set up!
                                    // IMPORTANT: we await run() to ensure that all initial assets have been loaded
                                    // and that setup is complete
                                    await windowWithRun.run(mode || 'play');
                                    window.parent.postMessage({
                                        type: 'RUN_COMPLETED',
                                        messageId: message.messageId,
                                        runId: runId
                                    }, '*');
                                }
                                catch (error) {
                                    _lib.log(`ERROR: Game run() function threw an error: ${error}`);
                                }
                            }
                            else {
                                _lib.log("ERROR: 'run(mode)' function is not defined by the game script.");
                                // Send analytics for missing run function
                                window.parent.postMessage({
                                    type: 'ANALYTICS_MESSAGE',
                                    eventName: 'run_function_missing',
                                    eventData: {
                                        gameId: gameMetadata?.gameId || '',
                                        mode: mode
                                    }
                                }, '*');
                                _lib.log(`Available global functions: ${Object.keys(window).filter(k => typeof window[k] === 'function' && !k.startsWith('__')).join(', ')}`);
                                // Try to find any script tags in the document
                                const scripts = Array.from(document.getElementsByTagName('script'));
                                _lib.log(`Found ${scripts.length} script tags in the document`);
                                scripts.forEach((script, index) => {
                                    _lib.log(`Script ${index}: ${script.src || 'inline'}, data-astrocade: ${script.getAttribute('data-astrocade-injected') || 'none'}`);
                                });
                            }
                        };
                        // Show click-to-play overlay in play mode unless explicitly hidden
                        if (mode === 'play' && !hideClickToPlayOverlay) {
                            // Use requestAnimationFrame to ensure DOM has been painted
                            requestAnimationFrame(() => {
                                // Double RAF to ensure layout is complete
                                requestAnimationFrame(() => {
                                    createClickToPlayOverlay(executeRun);
                                });
                            });
                        }
                        else {
                            // No overlay, run immediately
                            await executeRun();
                        }
                        break;
                    }
                    case 'INVOKE_CALLBACK': {
                        callbackManager.invoke(message.callbackId, ...(message.args || []));
                        break;
                    }
                    default:
                        _lib.log(`[lib.ts] Unknown message type: ${message}`);
                }
                // If message processing succeeded, prepare success ack
                if (message.messageId) {
                    ackMessage = {
                        type: 'IFRAME_ACK',
                        messageId: message.messageId,
                        status: 'success'
                    };
                }
            }
            catch (error) {
                // If message processing failed, prepare error ack
                if (message.messageId) {
                    ackMessage = {
                        type: 'IFRAME_ACK',
                        messageId: message.messageId,
                        status: 'error',
                        error: {
                            message: error instanceof Error ? error.message : 'Unknown error',
                            stack: error instanceof Error ? error.stack : undefined
                        }
                    };
                }
                // Also log the error
                _lib.log(`[lib.ts] Error processing message ${message.type}: ${error}`);
            }
            // Send acknowledgment if messageId was provided
            if (ackMessage) {
                window.parent.postMessage(ackMessage, '*');
            }
        });
        return _lib;
    })();
    // We attach it to the window so it's globally accessible in the iframe's script.
    window.lib = lib;
})(); // End of IIFE
</script>
